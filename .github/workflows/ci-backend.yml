name: CI Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio httpx

      - name: Install project dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            echo "⚠️  No requirements.txt or pyproject.toml found, skipping."
          fi

      - name: Run Ruff (lint)
        run: ruff check . --output-format=github

      - name: Run pytest
        run: |
          if [ -d tests ] && [ "$(ls -A tests/)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "⚠️  No tests found, skipping pytest."
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'placeholder_key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'placeholder' }}
          REDIS_URL: ${{ secrets.REDIS_URL || 'redis://localhost:6379' }}
          TESTING: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache/
          retention-days: 7