[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "migrations",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]   # line too long — handled by formatter

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]